name: Daily Standings Update

on:
  schedule:
    # 06:00 UTC = 09:00 Saudi Arabia Standard Time (AST, UTC+3)
    - cron: '0 6 * * *'
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch live standings from API-Football
        run: |
          curl --fail --silent --show-error \
            --request GET \
            --url 'https://v3.football.api-sports.io/standings?league=1&season=2026' \
            --header "x-apisports-key: ${{ secrets.APISPORTS_KEY }}" \
            -o standings.raw.json

      - name: Stamp last-updated time (AST) and finalize file
        run: |
          # add a human-readable lastUpdated field the site can display
          STAMP="$(TZ='Asia/Riyadh' date '+%Y-%m-%d %H:%M AST')"
          # merge the stamp into the JSON payload using jq (preinstalled on ubuntu runners)
          jq --arg s "$STAMP" '. + {lastUpdated: $s}' standings.raw.json > standings.json
          rm -f standings.raw.json

      - name: Commit and push if changed
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add standings.json
          git commit -m "Automated data sync: daily standings update" || exit 0
          git push
