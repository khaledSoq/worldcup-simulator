name: Daily Standings Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch live standings from ESPN
        run: |
          curl --fail --silent --show-error \
            --url 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings' \
            -o standings.raw.json
          jq '.children | length' standings.raw.json

      - name: Validate response shape
        run: |
          COUNT=$(jq '.children | length' standings.raw.json 2>/dev/null || echo 0)
          if [ "$COUNT" -lt 1 ]; then
            echo "No groups — aborting."
            exit 1
          fi

      - name: Stamp timestamp and write standings.json
        run: |
          STAMP="$(TZ='Asia/Riyadh' date '+%Y-%m-%d %H:%M AST')"
          jq --arg s "$STAMP" '. + {lastUpdated: $s}' standings.raw.json > standings.json
          rm standings.raw.json

      - name: Push to remote
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main --rebase --autostash
          git add standings.json
          if git diff --cached --quiet; then
            echo "No changes — skipping."
            exit 0
          fi
          git commit -m "Data sync $(TZ='Asia/Riyadh' date '+%Y-%m-%d %H:%M AST')"
          git push origin main
